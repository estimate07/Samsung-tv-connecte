name: Build Samsung Remote APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build APK - Ultimate Fix
      run: |
        rm -rf www android node_modules package-lock.json
        mkdir -p www
        cp samsung_tv_remote_single.html www/index.html
        npm init -y
        npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6

        npx cap init "TV Remote" "com.samsung.remote" --web-dir=www

        cat > capacitor.config.json <<EOF
        {
          "appId": "com.samsung.remote",
          "appName": "TV Remote",
          "webDir": "www",
          "server": {
            "androidScheme": "http",
            "cleartext": true
          }
        }
        EOF

        npx cap add android
        npx cap sync android

        sed -i 's/<application/<application android:usesCleartextTraffic="true" android:networkSecurityConfig="@xml\/network_security_config"/' android/app/src/main/AndroidManifest.xml

        mkdir -p android/app/src/main/res/xml
        cat > android/app/src/main/res/xml/network_security_config.xml <<EOF
        <?xml version="1.0" encoding="utf-8"?>
        <network-security-config>
            <base-config cleartextTrafficAllowed="true">
                <trust-anchors>
                    <certificates src="system" />
                    <certificates src="user" />
                </trust-anchors>
            </base-config>
        </network-security-config>
        EOF

    - name: Compile APK
      working-directory: android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - uses: actions/upload-artifact@v4
      with:
        name: Samsung-Remote-APK-FINAL
        path: android/app/build/outputs/apk/debug/*.apk
