name: Build Samsung Remote APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Auto-Wrap HTML into Android App
      run: |
        mkdir -p www
        cp index.html www/
        npm init -y
        npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6
        npx cap init "TV Remote" "com.samsung.remote" --web-dir www
        npx cap add android

    - name: Bypass SSL Certificate Block (The TV Hack)
      run: |
        # Forces the Android WebView to blindly accept the TV's self-signed WSS certificate
        sed -i 's/handler.cancel()/handler.proceed()/g' node_modules/@capacitor/android/capacitor/src/main/java/com/getcapacitor/BridgeWebViewClient.java
        
        # Forces Android to allow standard WS cleartext traffic
        sed -i 's/<application/<application android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml

    - name: Sync Android Code
      run: npx cap sync android

    - name: Boost Memory & Make Executable
      working-directory: android
      run: |
        mkdir -p ~/.gradle
        echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8" > ~/.gradle/gradle.properties
        chmod +x gradlew

    - name: Build debug APK
      working-directory: android
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Samsung-Remote-APK
        path: android/app/build/outputs/apk/debug/*.apk
