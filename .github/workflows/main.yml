name: Build Samsung Remote APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build APK - FIXED
      run: |
        rm -rf www android node_modules package-lock.json
        mkdir -p www
        cp index.html www/
        npm init -y
        npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6
        
        # FIXED: removed --npm-client flag
        npx cap init "TV Remote" "com.samsung.remote" --web-dir=www
        
        cat > capacitor.config.json <<EOF
        {
          "appId": "com.samsung.remote",
          "appName": "TV Remote",
          "webDir": "www",
          "server": {
            "androidScheme": "https",
            "cleartext": true
          }
        }
        EOF
        
        npx cap add android
        npx cap sync android
        
        sed -i 's/<application/<application android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml
        
        MAIN=android/app/src/main/java/com/samsung/remote/MainActivity.java
        cat > $MAIN <<'JAVA'
        package com.samsung.remote;
        import android.os.Bundle;
        import android.webkit.WebView;
        import android.webkit.SslErrorHandler;
        import android.net.http.SslError;
        import android.webkit.WebViewClient;
        import com.getcapacitor.BridgeActivity;
        public class MainActivity extends BridgeActivity {
            @Override
            public void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                WebView wv = getBridge().getWebView();
                wv.getSettings().setMixedContentMode(0);
                wv.getSettings().setDomStorageEnabled(true);
                wv.setWebViewClient(new WebViewClient() {
                    @Override
                    public void onReceivedSslError(WebView view, SslErrorHandler handler, SslError error) {
                        handler.proceed();
                    }
                });
            }
        }
        JAVA

    - name: Compile APK
      working-directory: android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - uses: actions/upload-artifact@v4
      with:
        name: Samsung-Remote-APK-FIXED
        path: android/app/build/outputs/apk/debug/*.apk
